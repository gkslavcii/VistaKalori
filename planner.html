<script>
function escHTML(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
var ML=['kahvalti','ogle','aksam','atistirmalik'],MLB={kahvalti:'🌅 Kahvaltı',ogle:'☀️ Öğle',aksam:'🌙 Akşam',atistirmalik:'🍿 Atıştırmalık'};
var DTR=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'],DF=['Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi','Pazar'];
var pWO=0,pSD=0,_pTgt=null;

// ═══════ SOFRA (Aile/Ev paylaşımı) ═══════
// NOT: Bu planner artık SADECE kişisel plandır.
// Sofra'nın haftalık menüsü Topluluk → Sofra sekmesinde bağımsız çalışır.
// pActiveSofraId() burada her zaman null döner → tüm veri kişisel kalır.
function pActiveSofraId(){ return null; }
function _pGetSofraId(){
  return (window.Sofra && window.Sofra.getActive) ? window.Sofra.getActive() : null;
}
function _pDateISO(w,d){return pDate(w,d).toISOString().split('T')[0];}
// Plan anahtarı: aktif Sofra varsa namespace'li, yoksa eski format
function pKey(w,d){
  var iso=_pDateISO(w,d);
  var sId=pActiveSofraId();
  return sId ? ('fs_sofra_'+sId+'_plan_'+iso) : ('fs_plan_'+iso);
}
// localStorage key'inden sadece tarih kısmını al (Firestore doc id için)
function _pDocId(key){
  var m=key.match(/plan_(\d{4}-\d{2}-\d{2})$/);
  return m ? ('fs_plan_'+m[1]) : key;
}
// Aktif Sofra'ya veya kullanıcı planına göre Firestore referansı
function pPlanDocRef(key){
  if(typeof db==='undefined'||typeof auth==='undefined'||!auth.currentUser)return null;
  var sId=pActiveSofraId();
  if(sId){
    return db.collection('sofras').doc(sId).collection('plans').doc(_pDocId(key));
  }
  return db.collection('user_data').doc(auth.currentUser.uid).collection('plans').doc(key);
}

function pDate(w,d){var n=new Date,m=new Date(n);m.setDate(n.getDate()-((n.getDay()+6)%7)+w*7+d);m.setHours(0,0,0,0);return m}
function pGet(w,d){var r=localStorage.getItem(pKey(w,d));return r?JSON.parse(r):{kahvalti:[],ogle:[],aksam:[],atistirmalik:[]}}
function pSet(w,d,v){
  localStorage.setItem(pKey(w,d),JSON.stringify(v));
  // Firestore sync (arka planda)
  pSyncToCloud(pKey(w,d),v);
}

// ═══════ FIRESTORE SYNC ═══════
var _pSyncTimer=null;
var _pSyncQueue={};

function pSyncToCloud(key,data){
  if(typeof db==='undefined'||typeof auth==='undefined')return;
  if(!auth.currentUser)return;
  _pSyncQueue[key]=data;
  // Debounce: 2sn içinde gelen yazmaları birleştir
  clearTimeout(_pSyncTimer);
  _pSyncTimer=setTimeout(pFlushSync,2000);
}

function pFlushSync(){
  if(typeof db==='undefined'||!auth.currentUser)return;
  var keys=Object.keys(_pSyncQueue);
  if(!keys.length)return;
  var uid=auth.currentUser.uid;
  var uname=(auth.currentUser.displayName||auth.currentUser.email||'').substring(0,30);
  var sId=pActiveSofraId();
  var batch=db.batch();
  keys.forEach(function(key){
    var ref=pPlanDocRef(key);
    if(!ref)return;
    var payload={data:_pSyncQueue[key],updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(sId){ payload.updatedByUid=uid; payload.updatedByName=uname; }
    batch.set(ref,payload,{merge:true});
  });
  _pSyncQueue={};
  batch.commit().catch(function(e){console.warn('Plan sync hatası:',e.message)});
}

// Firestore'dan planları yükle (ilk açılışta veya Sofra değişince)
function pSyncFromCloud(){
  if(typeof db==='undefined'||typeof auth==='undefined')return;
  if(!auth.currentUser)return;
  var sId=pActiveSofraId();
  // Bu haftanın 7 gününü kontrol et
  for(var d=0;d<7;d++){
    var key=pKey(pWO,d);
    var local=localStorage.getItem(key);
    // Sofra aktifse localStorage'ı görmezden gel (canlı veri önemli); kendi planında cache'i kullan
    if(!local||sId){
      (function(k,dayIdx){
        var ref=pPlanDocRef(k);
        if(!ref)return;
        ref.get().then(function(doc){
          if(doc.exists&&doc.data().data){
            localStorage.setItem(k,JSON.stringify(doc.data().data));
            rDays();if(dayIdx===pSD)rDay();
          }else if(sId){
            // Sofra'da o gün hiç plan yoksa local'i temizle
            localStorage.removeItem(k);
            rDays();if(dayIdx===pSD)rDay();
          }
        }).catch(function(){});
      })(key,d);
    }
  }
  // Kayıtlı planlar (sadece kişisel) Sofra ile ilgisiz
  if(!sId) pSyncSavedPlans();
}

// ═══════ SOFRA MARKET LİSTESİ — paylaşımlı checkbox + "Evde Var" (pantry) ═══════
function pShopWeekId(){return 'week_'+_pDateISO(pWO,0);} // Pazartesi ISO tarihi
var _pSofraShopChecks={}; // {key: {by, name, at}} — "aldım" işaretleri
var _pSofraShopPantry={}; // {key: {by, name, at}} — "evde var" işaretleri
var _pSofraShopUnsub=null;
var _pShowPantry=false; // Evde olanları göster modu (UI state)

function pTeardownSofraShopSync(){
  if(_pSofraShopUnsub){try{_pSofraShopUnsub()}catch(_){}_pSofraShopUnsub=null;}
  _pSofraShopChecks={};
  _pSofraShopPantry={};
}
function pSetupSofraShopSync(){
  pTeardownSofraShopSync();
  var sId=pActiveSofraId();
  if(!sId||typeof auth==='undefined'||!auth.currentUser)return;
  var ref=db.collection('sofras').doc(sId).collection('shoppingLists').doc(pShopWeekId());
  _pSofraShopUnsub=ref.onSnapshot(function(doc){
    var data=doc.exists?doc.data():{};
    _pSofraShopChecks=data.checks||{};
    _pSofraShopPantry=data.pantry||{};
    var sec=document.getElementById('pShopSec');
    if(sec&&sec.style.display==='block'){_renderShopList(sec);}
  },function(e){console.warn('Sofra shop snapshot:',e.message);});
}

// ═══════ SOFRA CANLI SYNC (onSnapshot) ═══════
var _pSofraUnsubs=[];
function pTeardownSofraSync(){
  _pSofraUnsubs.forEach(function(u){try{u()}catch(_){}});
  _pSofraUnsubs=[];
}
function pSetupSofraSync(){
  pTeardownSofraSync();
  if(typeof auth==='undefined'||!auth.currentUser)return;
  var sId=pActiveSofraId();
  if(!sId)return;
  for(var d=0;d<7;d++){
    var key=pKey(pWO,d);
    var ref=pPlanDocRef(key);
    if(!ref)continue;
    (function(k,dayIdx,r){
      var u=r.onSnapshot(function(doc){
        var remoteStr=doc.exists&&doc.data().data?JSON.stringify(doc.data().data):'';
        var localStr=localStorage.getItem(k)||'';
        if(remoteStr&&remoteStr!==localStr){
          localStorage.setItem(k,remoteStr);
          rDays();if(dayIdx===pSD)rDay();
        }else if(!doc.exists&&localStr){
          localStorage.removeItem(k);
          rDays();if(dayIdx===pSD)rDay();
        }
      },function(e){console.warn('Sofra snapshot:',e.message)});
      _pSofraUnsubs.push(u);
    })(key,d,ref);
  }
}

// ═══════ SOFRA SEÇİCİ (üst bar) ═══════
function pRenderSofraSelector(){
  // Planner artık sadece kişisel — Sofra seçici kalıcı gizli
  var el=document.getElementById('pSofraSelector');
  if(el){el.style.display='none';el.innerHTML='';}
  return;
  // eslint-disable-next-line no-unreachable
  if(!window.Sofra||typeof auth==='undefined'||!auth.currentUser){el.style.display='none';return;}
  var sofras=window.Sofra.getAll();
  if(!sofras.length){el.style.display='none';return;}
  var active=window.Sofra.getActive();
  var bg=active?'var(--accent-glow)':'var(--glass)';
  var bd=active?'var(--accent)':'var(--border)';
  var label=active?'🍽️ Sofra':'👤 Kendi planım';
  var lblColor=active?'var(--accent)':'var(--text2)';
  var html='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:'+bg+';border:1.5px solid '+bd+';border-radius:12px">';
  html+='<span style="font-size:.72rem;font-weight:800;color:'+lblColor+';white-space:nowrap">'+label+':</span>';
  html+='<select onchange="pSwitchSofra(this.value)" style="flex:1;background:transparent;border:none;font-size:.82rem;font-weight:700;color:var(--text);outline:none;font-family:var(--font,system-ui);cursor:pointer">';
  html+='<option value="">👤 Kendi planım</option>';
  sofras.forEach(function(s){
    var sel=s.id===active?' selected':'';
    html+='<option value="'+s.id+'"'+sel+'>🍽️ '+escHTML(s.name)+'</option>';
  });
  html+='</select>';
  if(active){
    var s=sofras.find(function(x){return x.id===active;});
    var mc=s&&s.memberIds?s.memberIds.length:0;
    html+='<span style="font-size:.68rem;color:var(--text2);white-space:nowrap">'+mc+' üye</span>';
  }
  html+='</div>';
  el.innerHTML=html;
  el.style.display='block';
}
function pSwitchSofra(id){
  if(window.Sofra) window.Sofra.setActive(id||null);
}

// Sofra değişince tüm akış yeniden
window.addEventListener('sofra:changed',function(){
  pTeardownSofraSync();
  pTeardownSofraShopSync();
  rDays();rDay();
  pSyncFromCloud();
  pSetupSofraSync();
  pSetupSofraShopSync();
  pRenderSofraSelector();
  // Market listesi açıksa kapat (yeni context'te yeniden açılsın)
  var sec=document.getElementById('pShopSec');
  if(sec&&sec.style.display==='block'){sec.style.display='none';}
});

function pSyncSavedPlans(){
  if(typeof db==='undefined'||!auth.currentUser)return;
  var uid=auth.currentUser.uid;
  var local=localStorage.getItem('fs_saved_plans');
  if(local){
    // Yerel varsa Firestore'a yaz
    db.collection('user_data').doc(uid).collection('plans').doc('_saved').set({
      data:JSON.parse(local),updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true}).catch(function(){});
  }else{
    // Yerel yoksa Firestore'dan çek
    db.collection('user_data').doc(uid).collection('plans').doc('_saved').get()
      .then(function(doc){
        if(doc.exists&&doc.data().data){
          localStorage.setItem('fs_saved_plans',JSON.stringify(doc.data().data));
          rSaved();
        }
      }).catch(function(){});
  }
}

(function(){
  var today=new Date;pSD=(today.getDay()+6)%7;

  // Topluluk→Sofra'dan "belirli tarihe git" flag'i
  try{
    var jumpIso=localStorage.getItem('fs_planner_jump_date');
    if(jumpIso){
      localStorage.removeItem('fs_planner_jump_date');
      var jd=new Date(jumpIso+'T00:00:00');
      if(!isNaN(jd)){
        var now=new Date(); now.setHours(0,0,0,0);
        var mon=new Date(now); mon.setDate(now.getDate()+((now.getDay()===0?-6:1-now.getDay())));
        var weeks=Math.floor((jd-mon)/(7*24*3600*1000));
        pWO=weeks;
        pSD=(jd.getDay()+6)%7;
      }
    }
  }catch(_){}

  planWeek(0);rTpls();rSaved();
  pRenderSofraSelector();

  // Topluluk→Sofra'dan "alışveriş listesini aç" flag'i
  try{
    if(localStorage.getItem('fs_planner_open_shop')==='1'){
      localStorage.removeItem('fs_planner_open_shop');
      setTimeout(function(){
        var sec=document.getElementById('pShopSec');
        if(sec&&typeof pShop==='function'){ pShop(); sec.scrollIntoView({behavior:'smooth',block:'start'}); }
      }, 400);
    }
  }catch(_){}
  // Auth hazır olduğunda Firestore'dan sync et + Sofra seçiciyi güncelle
  if(typeof auth!=='undefined'){auth.onAuthStateChanged(function(u){
    if(u){
      pSyncFromCloud();
      // Sofra listesi yüklenmiş olabilir, biraz bekleyip selector'ı tazele
      setTimeout(function(){ pRenderSofraSelector(); pSetupSofraSync(); pSetupSofraShopSync(); }, 600);
    }else{
      pTeardownSofraSync();
      pTeardownSofraShopSync();
      pRenderSofraSelector();
    }
  })}
  // Sofra modülü daha sonra yüklendiyse selector'ı tazelemek için bir kez daha dene
  setTimeout(pRenderSofraSelector, 1200);
})();

function planWeek(dir){
  if(dir!==0)pWO+=dir;
  var d=pDate(pWO,0),e=pDate(pWO,6);
  var l=d.getDate()+'.'+(d.getMonth()+1)+' – '+e.getDate()+'.'+(e.getMonth()+1);
  if(pWO===0)l='Bu Hafta';else if(pWO===1)l='Gelecek Hafta';else if(pWO===-1)l='Geçen Hafta';
  document.getElementById('pwLabel').textContent=l;rDays();rDay();
  // Hafta değişince: Sofra aktifse yeni haftanın canlı sync'ini kur (plan + market)
  if(pActiveSofraId()){
    pSyncFromCloud();
    pSetupSofraSync();
    pSetupSofraShopSync();
  }
}
function rDays(){
  var h='',td=new Date;td.setHours(0,0,0,0);
  for(var i=0;i<7;i++){var d=pDate(pWO,i),dt=pGet(pWO,i),tc=0;
    ML.forEach(function(m){(dt[m]||[]).forEach(function(f){tc+=f.cal||0})});
    var it=d.getTime()===td.getTime(),hm=tc>0;
    h+='<div class="plan-day-pill'+(i===pSD?' active':'')+(hm?' has-meals':'')+'" onclick="pSD='+i+';rDays();rDay()">';
    h+='<div class="pd-name">'+DTR[i]+'</div><div class="pd-num">'+(it?'●':d.getDate())+'</div><div class="pd-cal">'+(tc||'—')+'</div></div>'}
  document.getElementById('pDays').innerHTML=h
}
function rDay(){
  var dt=pGet(pWO,pSD),tC=0,tP=0,tK=0,tF=0;
  ML.forEach(function(m){(dt[m]||[]).forEach(function(f){tC+=f.cal||0;tP+=f.prot||0;tK+=f.carb||0;tF+=f.fat||0})});
  var tgt=2000;try{tgt=typeof dailyTarget!=='undefined'?dailyTarget:2000}catch(e){}
  var pct=tgt?Math.round(tC/tgt*100):0;
  var s='<div style="font-size:.82rem;font-weight:800;margin-bottom:8px;display:flex;align-items:center">📊 '+DF[pSD]+'<span style="margin-left:auto;font-size:.72rem;color:var(--text2)">%'+pct+'</span></div>';
  s+='<div style="height:4px;background:var(--glass);border-radius:2px;margin-bottom:8px;overflow:hidden"><div style="height:100%;width:'+Math.min(pct,100)+'%;background:var(--accent);border-radius:2px;transition:width .3s"></div></div>';

function pDirect(food,mk){

;(function(){

function pShopTog(n,c){
  var sId=pActiveSofraId();
  // Sofra aktifse Firestore'a yaz (canlı paylaşımlı)
  if(sId&&typeof auth!=='undefined'&&auth.currentUser&&typeof db!=='undefined'){
    var uname=(auth.currentUser.displayName||auth.currentUser.email||'Üye').substring(0,20);
    var ref=db.collection('sofras').doc(sId).collection('shoppingLists').doc(pShopWeekId());
    var upd={updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(c){
      upd['checks.'+n]={by:auth.currentUser.uid,name:uname,at:firebase.firestore.FieldValue.serverTimestamp()};
      _pSofraShopChecks[n]={by:auth.currentUser.uid,name:uname}; // Optimistic
    }else{
      upd['checks.'+n]=firebase.firestore.FieldValue.delete();
      delete _pSofraShopChecks[n];
    }
    ref.set(upd,{merge:true}).catch(function(e){
      if(typeof showToast==='function')showToast('⚠️ Market sync hatası: '+e.message);
    });
    return;
  }
  // Kişisel: localStorage
  var k='fs_pshop_'+pWO,i=JSON.parse(localStorage.getItem(k)||'[]');
  if(c&&i.indexOf(n)<0)i.push(n);
  if(!c)i=i.filter(function(x){return x!==n});
  localStorage.setItem(k,JSON.stringify(i));
}
function pPantryTog(n,c){
  var sId=pActiveSofraId();
  // Sofra aktifse Firestore'a yaz (paylaşımlı pantry)
  if(sId&&typeof auth!=='undefined'&&auth.currentUser&&typeof db!=='undefined'){
    var uname=(auth.currentUser.displayName||auth.currentUser.email||'Üye').substring(0,20);
    var ref=db.collection('sofras').doc(sId).collection('shoppingLists').doc(pShopWeekId());
    var upd={updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    if(c){
      upd['pantry.'+n]={by:auth.currentUser.uid,name:uname,at:firebase.firestore.FieldValue.serverTimestamp()};
      _pSofraShopPantry[n]={by:auth.currentUser.uid,name:uname}; // Optimistic
    }else{
      upd['pantry.'+n]=firebase.firestore.FieldValue.delete();
      delete _pSofraShopPantry[n];
    }
    ref.set(upd,{merge:true}).catch(function(e){
      if(typeof showToast==='function')showToast('⚠️ Pantry sync hatası: '+e.message);
    });
    _renderShopList(document.getElementById('pShopSec'));
    return;
  }
  // Kişisel: localStorage
  var k='fs_pantry_'+pWO,i=JSON.parse(localStorage.getItem(k)||'[]');
  if(c&&i.indexOf(n)<0)i.push(n);
  if(!c)i=i.filter(function(x){return x!==n});
  localStorage.setItem(k,JSON.stringify(i));
  _renderShopList(document.getElementById('pShopSec'));
}

  } else {
    var all={};for(var d=0;d<7;d++){var dt=pGet(pWO,d);ML.forEach(function(m){(dt[m]||[]).forEach(function(f){var k=f.name.toLowerCase();if(!all[k])all[k]={name:f.name,count:0};all[k].count++})})}
    Object.values(all).forEach(function(i){t+='☐ '+i.name+(i.count>1?' (×'+i.count+')':'')+'\n'});
  }
  navigator.clipboard.writeText(t).then(function(){if(typeof showToast==='function')showToast('📋 Kopyalandı!')})}

function rTpls(){var h='';TPLS.forEach(function(t,i){var tP=0,tK=0,tF=0;ML.forEach(function(m){(t.data[m]||[]).forEach(function(f){tP+=f.prot||0;tK+=f.carb||0;tF+=f.fat||0})});
  h+='<div class="plan-tpl" onclick="pTpl('+i+')"><h4>'+escHTML(t.name)+'</h4><p>'+escHTML(t.desc)+'</p><div class="ptm"><span style="color:var(--accent)">🔥'+t.cal+'</span><span style="color:#ff7a7a">P:'+Math.round(tP)+'g</span><span style="color:#22d3ee">K:'+Math.round(tK)+'g</span><span style="color:#ffcc55">Y:'+Math.round(tF)+'g</span></div></div>'});
  document.getElementById('pTpls').innerHTML=h}
function pTpl(i){var t=TPLS[i];if(!t||!confirm('"'+t.name+'" → '+DF[pSD]+'?'))return;pSet(pWO,pSD,JSON.parse(JSON.stringify(t.data)));rDays();rDay();if(typeof showToast==='function')showToast('✅ Uygulandı!')}

function pSave(){var n=document.getElementById('pSaveName').value.trim();if(!n){if(typeof showToast==='function')showToast('⚠️ Ad girin');return}
  var wd=[];for(var d=0;d<7;d++)wd.push(pGet(pWO,d));var sv=JSON.parse(localStorage.getItem('fs_saved_plans')||'[]');
  sv.unshift({id:Date.now(),name:n,weekData:wd,createdAt:new Date().toLocaleDateString('tr-TR')});if(sv.length>20)sv=sv.slice(0,20);
  localStorage.setItem('fs_saved_plans',JSON.stringify(sv));pSyncSavedPlans();document.getElementById('pSaveName').value='';rSaved();if(typeof showToast==='function')showToast('💾 Kaydedildi!')}
function rSaved(){var sv=JSON.parse(localStorage.getItem('fs_saved_plans')||'[]');
  if(!sv.length){document.getElementById('pSaved').innerHTML='<div style="font-size:.78rem;color:var(--text2);text-align:center;padding:12px">Henüz plan yok</div>';return}
  var h='';sv.forEach(function(p){var tC=0,nD=0;(p.weekData||[]).forEach(function(dd){var dc=0;ML.forEach(function(m){(dd[m]||[]).forEach(function(f){dc+=f.cal||0})});tC+=dc;if(dc>0)nD++});
    h+='<div style="background:var(--glass);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:.82rem">'+escHTML(p.name)+'</div><div style="font-size:.65rem;color:var(--text2)">'+escHTML(p.createdAt)+' · '+nD+' gün · ~'+Math.round(tC/(nD||1))+' kcal</div></div><button onclick="pLoad('+p.id+')" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:.68rem;font-weight:700;cursor:pointer">📥</button><button onclick="pDel('+p.id+')" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 8px;font-size:.68rem;cursor:pointer;color:var(--text2)">🗑️</button></div>'});
  document.getElementById('pSaved').innerHTML=h}
function pLoad(id){var sv=JSON.parse(localStorage.getItem('fs_saved_plans')||'[]'),p=sv.find(function(x){return x.id===id});if(!p||!confirm('"'+p.name+'" uygulanacak?'))return;(p.weekData||[]).forEach(function(dd,i){if(i<7)pSet(pWO,i,dd)});rDays();rDay();if(typeof showToast==='function')showToast('📥 Uygulandı!')}
function pDel(id){if(!confirm('Silinsin mi?'))return;var sv=JSON.parse(localStorage.getItem('fs_saved_plans')||'[]');sv=sv.filter(function(x){return x.id!==id});localStorage.setItem('fs_saved_plans',JSON.stringify(sv));pSyncSavedPlans();rSaved()}
